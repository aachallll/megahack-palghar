services:
  - type: web
    name: prahari-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CAMERA_SOURCE
        value: "0"
      - key: MODEL_CONFIDENCE
        value: "0.45"
      - key: FRONTEND_URL
        sync: false